<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subway Surfer - No Coin Edition</title>
  <link rel="stylesheet" href="game.css" />
</head>
<body>
  <div class="game-container">
    <canvas id="gameCanvas" width="1280" height="720"></canvas>
    
    <div class="hud-wrapper">
      <div class="hud-left">
        <div class="score-display">
          <span class="label">SCORE</span>
          <span class="value" id="scoreValue">0</span>
        </div>
        <div class="multiplier" id="multiplierDisplay"></div>
      </div>
      
      <div class="hud-center">
        <div class="highscore">Best: <span id="highscoreValue">0</span></div>
      </div>
      
      <div class="hud-right">
        <div class="stats">
          <div>Distance: <span id="distanceValue">0</span>m</div>
          <div>Items: <span id="itemsValue">0</span></div>
        </div>
      </div>
    </div>

    <div class="game-over-screen" id="gameOverScreen">
      <div class="game-over-content">
        <h1>Game Over</h1>
        <div class="final-score">
          <p>Score: <span id="finalScore">0</span></p>
          <p>Distance: <span id="finalDistance">0</span>m</p>
        </div>
        <button id="restartButton" class="restart-btn">Play Again</button>
      </div>
    </div>

    <div class="mobile-controls">
      <button class="control-btn left" id="leftBtn">LEFT</button>
      <button class="control-btn jump" id="jumpBtn">JUMP</button>
      <button class="control-btn right" id="rightBtn">RIGHT</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
